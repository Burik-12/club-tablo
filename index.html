<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Табло Оракула · Кубик</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0c0e16; --fg: #eef1f7; --hint: #8b93a7;
      --card: #161a28; --card2: #1d2233; --line: rgba(124,92,255,.16);
      --accent: #7c5cff; --accent2: #22d3ee; --gold: #ffce54;
      --green: #3ddc97; --orange: #ff8e3c; --live: #ff5c6c; --accent-fg: #fff;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--fg); padding: 14px 12px 100px; min-height: 100%;
      background:
        radial-gradient(820px 440px at 50% -12%, rgba(124,92,255,.20), transparent 60%),
        radial-gradient(680px 400px at 102% 2%, rgba(34,211,238,.16), transparent 58%),
        radial-gradient(900px 540px at 0% 104%, rgba(255,142,60,.14), transparent 60%),
        radial-gradient(700px 420px at 100% 100%, rgba(61,220,151,.10), transparent 58%),
        var(--bg);
    }
    button { font-family: inherit; }
    .press:active { transform: scale(.94); }
    .head { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
    .head .logo { font-size: 24px; filter: drop-shadow(0 0 8px rgba(124,92,255,.6)); }
    .head h1 { font-size: 17px; margin: 0; flex: 1; font-weight: 800; letter-spacing: .2px;
      background: linear-gradient(90deg, #fff, #b9a6ff); -webkit-background-clip: text;
      background-clip: text; -webkit-text-fill-color: transparent; }
    .head h1 small { display: block; font-size: 10px; font-weight: 600; letter-spacing: 2px;
      color: var(--hint); -webkit-text-fill-color: var(--hint); text-transform: uppercase; }
    .head .upd { font-size: 10px; color: var(--hint); text-align: right; max-width: 76px; }
    .view { display: none; animation: fade .28s ease; }
    .view.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .banner {
      background: linear-gradient(120deg, #ffce54, #ff8e3c); color: #2a1c00;
      border-radius: 16px; padding: 13px 15px; margin-bottom: 12px; font-size: 14px; font-weight: 600;
      box-shadow: 0 6px 20px rgba(255,142,60,.30);
    }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 16px;
      padding: 11px 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 11px;
    }
    .card.me { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 6px 18px rgba(124,92,255,.25); }
    .card.gold   { border-color: rgba(255,206,84,.55);  box-shadow: 0 6px 18px rgba(255,206,84,.16); }
    .card.silver { border-color: rgba(197,206,224,.45); }
    .card.bronze { border-color: rgba(205,127,80,.45); }
    .ava {
      width: 40px; height: 40px; border-radius: 13px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 21px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.16); object-fit: cover;
    }
    img.big-ava { object-fit: cover; }
    .pos { width: 24px; text-align: center; font-size: 16px; font-weight: 700; color: var(--hint); flex-shrink: 0; }
    .name { flex: 1; font-size: 15px; line-height: 1.2; min-width: 0; }
    .name .sub { font-size: 12px; color: var(--hint); margin-top: 3px; }
    .name .me-tag { font-size: 10px; background: var(--accent); color: var(--accent-fg);
      padding: 1px 6px; border-radius: 6px; margin-left: 4px; vertical-align: middle; }
    .coins { font-size: 15px; font-weight: 800; white-space: nowrap; color: var(--gold); }
    /* ── Матчи ── */
    .match { background: var(--card); border: 1px solid var(--line); border-radius: 16px;
      padding: 11px 13px; margin-bottom: 9px; }
    .mrow { display: flex; align-items: center; gap: 10px; }
    .mteams { flex: 1; font-size: 14.5px; line-height: 1.5; min-width: 0; }
    .mright { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .chip { font-size: 11px; padding: 3px 8px; border-radius: 9px; white-space: nowrap;
      background: var(--card2); color: var(--hint); }
    .chip.soon { background: rgba(255,142,60,.18); color: #ffb784; }
    .chip.urgent { background: rgba(255,92,108,.20); color: #ff9aa6; }
    .score { font-weight: 800; font-size: 17px; }
    .live { color: var(--live); }
    .badge-live { font-size: 9px; background: var(--live); color: #fff; padding: 2px 6px;
      border-radius: 7px; margin-left: 5px; animation: blink 1.2s infinite; vertical-align: middle; }
    @keyframes blink { 50% { opacity: .35; } }
    .bet-btn { border: none; background: linear-gradient(135deg, var(--accent), #6244e0);
      color: var(--accent-fg); font-size: 18px; width: 34px; height: 34px; border-radius: 11px;
      cursor: pointer; flex-shrink: 0; box-shadow: 0 3px 10px rgba(124,92,255,.35); }
    .bet-btn.ghost { background: var(--card2); box-shadow: none; }
    .youbet { font-size: 11px; color: var(--accent2); margin-right: 4px; align-self: center; white-space: nowrap; }
    .mfoot { margin-top: 9px; }
    .cons { display: flex; height: 7px; border-radius: 5px; overflow: hidden; background: rgba(255,255,255,.06); }
    .cons span { display: block; height: 100%; }
    .cons .h { background: var(--accent2); } .cons .d { background: #5a637a; } .cons .a { background: var(--orange); }
    .cons-l { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--hint); margin-top: 5px; }
    .against { color: #ffb784; font-weight: 600; }
    .watch {
      display: block; text-align: center; text-decoration: none; border: 1px solid var(--line);
      color: var(--fg); padding: 11px; border-radius: 12px; margin-bottom: 9px; font-size: 14px;
      background: var(--card);
    }
    .filters { display: flex; gap: 7px; margin-bottom: 11px; overflow-x: auto; padding-bottom: 3px;
      -webkit-overflow-scrolling: touch; }
    .filters::-webkit-scrollbar { display: none; }
    .filt { flex-shrink: 0; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 12px;
      border: 1px solid var(--line); background: var(--card); color: var(--hint); cursor: pointer; }
    .filt.on { background: linear-gradient(135deg, var(--accent), #6244e0); color: #fff; border-color: transparent;
      box-shadow: 0 3px 12px rgba(124,92,255,.3); }
    .azart { display: flex; gap: 7px; margin-top: 9px; flex-wrap: wrap; }
    .azb { font-size: 12px; font-weight: 600; padding: 7px 12px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--card2); color: var(--fg); cursor: pointer; }
    .azb.done { color: var(--green); border-color: rgba(61,220,151,.4); }
    .azb.off { color: var(--hint); opacity: .55; }
    .exp { width: 100%; border: none; background: linear-gradient(135deg, var(--orange), #e6701f);
      color: #2a1500; font-weight: 700; padding: 13px; border-radius: 13px; font-size: 14px;
      margin-bottom: 10px; cursor: pointer; box-shadow: 0 5px 16px rgba(255,142,60,.3); }
    .exp-done { text-align: center; color: var(--green); font-size: 13px; font-weight: 600;
      padding: 10px; margin-bottom: 10px; border: 1px solid rgba(61,220,151,.3); border-radius: 12px; }
    /* ── Фракции ── */
    .faction { display: block; }
    .faction .top { display: flex; align-items: center; gap: 8px; }
    .faction .fname { font-size: 16px; font-weight: 700; }
    .bar-bg { height: 9px; border-radius: 5px; background: rgba(255,255,255,.07); margin-top: 9px; overflow: hidden; }
    .bar { height: 100%; border-radius: 5px; transition: width .6s ease; }
    /* ── Профиль ── */
    .profile { text-align: center; padding-top: 6px; }
    .profile .big-ava { width: 96px; height: 96px; border-radius: 28px; margin: 0 auto 10px;
      display: flex; align-items: center; justify-content: center; font-size: 52px;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.18), 0 8px 26px rgba(124,92,255,.3); }
    .profile .pname { font-size: 21px; font-weight: 800; }
    .profile .pfac { font-size: 13px; color: var(--hint); margin-top: 3px; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; margin-top: 16px; }
    .stat { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 15px 10px; }
    .stat .v { font-size: 23px; font-weight: 800; }
    .stat .l { font-size: 12px; color: var(--hint); margin-top: 3px; }
    .block { background: var(--card); border: 1px solid var(--line); border-radius: 16px;
      padding: 13px; margin-top: 12px; text-align: left; }
    .block h3 { margin: 0 0 9px; font-size: 12px; color: var(--hint); font-weight: 700;
      letter-spacing: .6px; text-transform: uppercase; }
    .badges { display: flex; flex-wrap: wrap; gap: 9px; }
    .badge { font-size: 25px; } .badge.locked { filter: grayscale(1); opacity: .28; }
    .hrow { display: flex; align-items: center; gap: 9px; padding: 9px 2px; font-size: 13px;
      border-bottom: 1px solid var(--line); }
    .hrow:last-child { border-bottom: none; }
    .hrow .ht { font-size: 17px; flex-shrink: 0; letter-spacing: -2px; }
    .hrow .hs { flex: 1; color: var(--hint); min-width: 0; }
    .hrow .hs b { color: var(--fg); }
    .hrow .hres { white-space: nowrap; font-weight: 700; }
    .hres.win { color: var(--green); } .hres.miss { color: var(--hint); }
    canvas { width: 100%; height: 56px; display: block; }
    .share { width: 100%; border: none; background: linear-gradient(135deg, var(--accent), #6244e0);
      color: var(--accent-fg); padding: 13px; border-radius: 13px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 14px; box-shadow: 0 5px 16px rgba(124,92,255,.32); }
    .stage-h { font-size: 12px; color: var(--accent2); margin: 16px 2px 7px; text-transform: uppercase;
      letter-spacing: .8px; font-weight: 700; }
    .feed-item { display: flex; gap: 9px; padding: 10px 13px; background: var(--card);
      border: 1px solid var(--line); border-radius: 12px; margin-bottom: 7px; font-size: 14px; }
    .feed-item .ft { color: var(--hint); font-size: 11px; white-space: nowrap; }
    .empty { color: var(--hint); text-align: center; padding: 44px 12px; line-height: 1.6; }
    /* ── Навигация ── */
    .nav { position: fixed; left: 0; right: 0; bottom: 0; display: flex; gap: 2px;
      background: rgba(13,15,24,.94); backdrop-filter: blur(14px);
      border-top: 1px solid var(--line); padding: 8px 6px calc(8px + env(safe-area-inset-bottom)); z-index: 40; }
    .nav button { flex: 1; border: none; background: none; color: var(--hint); cursor: pointer;
      padding: 9px 1px; font-size: 11px; font-weight: 600; border-radius: 14px;
      display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all .15s; }
    .nav button .ic { font-size: 25px; line-height: 1; }
    .nav button.active { color: #fff; background: linear-gradient(135deg, rgba(124,92,255,.30), rgba(34,211,238,.18)); }
    .nav button.active .ic { filter: drop-shadow(0 0 8px rgba(124,92,255,.8)); transform: translateY(-1px); }
    /* ── Модалки ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.62); display: none;
      align-items: flex-end; z-index: 50; backdrop-filter: blur(2px); }
    .modal-bg.open { display: flex; }
    .modal { background: linear-gradient(180deg, #141826, var(--bg)); width: 100%;
      border-radius: 22px 22px 0 0; padding: 18px 16px 28px; animation: up .28s ease;
      border-top: 1px solid var(--line); }
    @keyframes up { from { transform: translateY(100%); } to { transform: none; } }
    .modal h2 { font-size: 16px; margin: 0 0 4px; text-align: center; }
    .presets { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin: 14px 0 6px; }
    .preset { border: 1px solid var(--line); background: var(--card); color: var(--fg);
      border-radius: 11px; padding: 8px 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .preset.dice { background: linear-gradient(135deg, var(--accent2), #14b8c8); color: #06222a; border: none; }
    .picker { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 8px 0 16px; }
    .stepper { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .stepper .t { font-size: 12px; color: var(--hint); max-width: 92px; text-align: center; }
    .stepper .row { display: flex; align-items: center; gap: 10px; }
    .stepper .row button { width: 38px; height: 38px; border-radius: 12px; border: none; font-size: 21px;
      background: var(--card2); color: var(--fg); cursor: pointer; }
    .stepper .row .num { font-size: 30px; font-weight: 800; width: 30px; text-align: center; }
    .colon { font-size: 28px; font-weight: 800; padding-top: 20px; color: var(--hint); }
    .go { width: 100%; border: none; background: linear-gradient(135deg, var(--accent), #6244e0);
      color: var(--accent-fg); padding: 15px; border-radius: 13px; font-size: 15px; font-weight: 700;
      cursor: pointer; box-shadow: 0 5px 16px rgba(124,92,255,.32); }
    .hint-sm { font-size: 12px; color: var(--hint); text-align: center; margin-top: 11px; }
    .cgrid { max-height: 54vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cgrid button { background: var(--card); color: var(--fg); border: 1px solid var(--line);
      border-radius: 12px; padding: 12px 10px; font-size: 14px; text-align: left; cursor: pointer; }
    .cgrid button.sel { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
    /* ── Праздничный «бросок» ── */
    .celebrate { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 96px; z-index: 60; pointer-events: none; animation: cel .8s ease forwards; }
    @keyframes cel { 0% { transform: scale(.3) rotate(-25deg); opacity: 0; }
      35% { transform: scale(1.25) rotate(8deg); opacity: 1; }
      70% { transform: scale(1) rotate(0); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }
    /* 🎉 конфетти */
    .confetti { position: fixed; top: -12px; width: 9px; height: 9px; z-index: 59; border-radius: 2px;
      pointer-events: none; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(102vh) rotate(720deg); opacity: .9; } }
    /* 🏆 подиум топ-3 */
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; margin: 4px 0 16px; }
    .pod { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 30%; }
    .pod .pava { width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
      display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2.5px solid; }
    .pod .pn { font-size: 12px; font-weight: 600; text-align: center; line-height: 1.1; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pod .pc { font-size: 12px; font-weight: 800; color: var(--gold); }
    .pod .stand { width: 100%; border-radius: 10px 10px 0 0; display: flex; align-items: flex-start;
      justify-content: center; padding-top: 6px; font-size: 18px; font-weight: 800; color: #0c0e16; }
    .pod.p1 .pava { border-color: var(--gold); box-shadow: 0 0 16px rgba(255,206,84,.5); }
    .pod.p1 .stand { height: 64px; background: linear-gradient(180deg, #ffce54, #d99e1e); }
    .pod.p2 .pava { border-color: #c7cfde; } .pod.p2 .stand { height: 48px; background: linear-gradient(180deg, #c7cfde, #8b93a7); }
    .pod.p3 .pava { border-color: #cd7f50; } .pod.p3 .stand { height: 38px; background: linear-gradient(180deg, #cd7f50, #9c5a32); }
    /* кольцо аватарки по фракции */
    .ava.zen, img.ava.zen { box-shadow: 0 0 0 2px #3ddc97, inset 0 0 0 2px rgba(255,255,255,.16); }
    .ava.chaos, img.ava.chaos { box-shadow: 0 0 0 2px #ff8e3c, inset 0 0 0 2px rgba(255,255,255,.16); }
    /* ✨ скелетон-загрузка */
    .sk { background: var(--card); border: 1px solid var(--line); border-radius: 16px; height: 62px;
      margin-bottom: 8px; position: relative; overflow: hidden; }
    .sk::after { content: ''; position: absolute; inset: 0; transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
      animation: shimmer 1.3s infinite; }
    @keyframes shimmer { to { transform: translateX(100%); } }
    /* 🤝 канат фракций */
    .tug { margin: 6px 0 4px; }
    .tug-head { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .tug-bar { height: 26px; border-radius: 13px; overflow: hidden; display: flex; border: 1px solid var(--line); }
    .tug-bar .z { background: linear-gradient(90deg, #2bbf86, #3ddc97); }
    .tug-bar .c { background: linear-gradient(90deg, #ff8e3c, #ff6b2c); margin-left: auto; }
    .tug-bar span { height: 100%; transition: width .7s ease; display: flex; align-items: center;
      font-size: 11px; font-weight: 800; color: #0c0e16; }
    .tug-bar .z span, .tug-bar .z { justify-content: flex-start; }
    .tug-mid { width: 3px; background: #fff; opacity: .5; }
    /* индикатор активной вкладки */
    .nav button.active::after { content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); margin-top: 1px; box-shadow: 0 0 6px var(--accent); }
    /* липкая «моя строка» в топе */
    .myrow { position: sticky; top: -2px; z-index: 5; }
    /* тост гола */
    .gtoast { position: fixed; left: 12px; right: 12px; top: 12px; z-index: 58; background: linear-gradient(135deg, var(--live), #d6394a);
      color: #fff; padding: 12px 14px; border-radius: 14px; font-weight: 700; box-shadow: 0 8px 24px rgba(255,92,108,.4);
      animation: gtin .3s ease, gtout .4s ease 2.6s forwards; }
    @keyframes gtin { from { transform: translateY(-120%); } to { transform: none; } }
    @keyframes gtout { to { transform: translateY(-140%); opacity: 0; } }
  </style>
</head>
<body>
  <div class="head">
    <span class="logo">🎲</span>
    <h1>Табло Оракула<small>🌴 Клуб Сомнительных Решений</small></h1>
    <div class="upd" id="upd"></div>
  </div>

  <div class="view active" id="v-oracles"></div>
  <div class="view" id="v-today"></div>
  <div class="view" id="v-bracket"></div>
  <div class="view" id="v-feed"></div>
  <div class="view" id="v-factions"></div>
  <div class="view" id="v-me"></div>

  <nav class="nav">
    <button class="active" data-v="oracles"><span class="ic">🏆</span>Топ</button>
    <button data-v="today"><span class="ic">⚽</span>Матчи</button>
    <button data-v="bracket"><span class="ic">🗺</span>Сетка</button>
    <button data-v="feed"><span class="ic">📜</span>Лента</button>
    <button data-v="factions"><span class="ic">🤝</span>Лагеря</button>
    <button data-v="me"><span class="ic">🎭</span>Я</button>
  </nav>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <h2 id="m-title"></h2>
      <div class="hint-sm" style="margin-top:0">Быстрый счёт или крути сам</div>
      <div class="presets" id="m-presets"></div>
      <div class="picker">
        <div class="stepper"><div class="t" id="m-home"></div>
          <div class="row"><button class="press" onclick="step('h',-1)">−</button><span class="num" id="m-hs">1</span><button class="press" onclick="step('h',1)">+</button></div>
        </div>
        <div class="colon">:</div>
        <div class="stepper"><div class="t" id="m-away"></div>
          <div class="row"><button class="press" onclick="step('a',-1)">−</button><span class="num" id="m-as">1</span><button class="press" onclick="step('a',1)">+</button></div>
        </div>
      </div>
      <button class="go press" onclick="sendBet()">🎲 Поставить прогноз</button>
      <div class="hint-sm">Ставка засчитается сразу — прямо здесь.</div>
    </div>
  </div>

  <div class="modal-bg" id="champ-bg">
    <div class="modal">
      <h2>🏆 Выбери чемпиона ЧМ</h2>
      <div class="hint-sm" style="margin-top:0">Угадаешь — джекпот в финале</div>
      <div id="champ-list" class="cgrid" style="margin-top:12px"></div>
    </div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    try { tg.ready(); tg.expand(); tg.setHeaderColor && tg.setHeaderColor('#0c0e16'); } catch (e) {}
    // Адрес бэкенда: если окно открыто как Mini App с Pages — он зашит в start_param (base64url),
    // иначе пусто = тот же origin (когда страницу отдаёт сам бэкенд, напр. из лички).
    function backendBase() {
      try {
        const sp = tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param;
        if (!sp) return '';
        let b64 = sp.replace(/-/g, '+').replace(/_/g, '/');
        b64 += '==='.slice((b64.length + 3) % 4);
        return decodeURIComponent(escape(atob(b64))).replace(/\/+$/, '');
      } catch (e) { return ''; }
    }
    const API = backendBase();
    const api = (p) => API ? (API + '/' + p.replace(/^\//, '')) : p;
    const myId = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : null;
    const medals = ["🥇", "🥈", "🥉"];

    function allin(mid) { apiAction('api/allin', { match_id: mid }, '🔥 Ва-банк', '🔥'); }
    function insure(mid) { apiAction('api/insurance', { match_id: mid }, '🛡 Страховка', '🛡'); }
    function parlay() { apiAction('api/parlay', {}, '🎟 Экспресс', '🎟'); }
    function historyBlock(d) {
      const h = (d.me && d.me.history) || [];
      if (!h.length) return '';
      const ic = { exact: '🎯 точно', diff: '➕ разница', outcome: '✅ исход', miss: '❌ мимо' };
      const rows = h.map(x => {
        const win = x.result !== 'miss';
        return `<div class="hrow">
          <span class="ht">${x.hf}${x.af}</span>
          <span class="hs">ты <b>${x.pred}</b> · факт ${x.real} <span style="opacity:.7">· ${ic[x.result] || ''}</span></span>
          <span class="hres ${win ? 'win' : 'miss'}">${x.coins > 0 ? '+' + x.coins : '+0'}🪙</span>
        </div>`;
      }).join('');
      return `<div class="block"><h3>📜 История ставок</h3>${rows}</div>`;
    }
    function championBlock(d) {
      const c = d.me && d.me.champion;
      if (!d.champion_open) return c ? `<div class="block"><h3>🏆 Чемпион</h3><div class="pfac">${c.flag} ${esc(c.ru)} · окно закрыто</div></div>` : '';
      return `<div class="block"><h3>🏆 Чемпион турнира</h3>`
        + (c ? `<div class="pfac" style="margin-bottom:9px">твой выбор: ${c.flag} ${esc(c.ru)}</div>` : '')
        + `<button class="share press" style="margin-top:0" onclick="openChampion()">${c ? '🔁 Сменить чемпиона' : '🏆 Выбрать чемпиона'}</button></div>`;
    }
    function openChampion() {
      const teams = (DATA && DATA.teams) || [];
      const cur = (DATA && DATA.me && DATA.me.champion) ? DATA.me.champion.en : null;
      $('champ-list').innerHTML = teams.map(t => {
        const en = t.en.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        return `<button class="press ${t.en === cur ? 'sel' : ''}" onclick="pickChampion('${en}')">${t.flag} ${esc(t.ru)}</button>`;
      }).join('');
      $('champ-bg').classList.add('open');
    }
    function pickChampion(en) { apiAction('api/champion', { team: en }, '🏆 Чемпион', '🏆'); }
    document.addEventListener('DOMContentLoaded', () => {
      const cb = $('champ-bg'); if (cb) cb.onclick = (e) => { if (e.target.id === 'champ-bg') e.target.classList.remove('open'); };
    });
    function sendBet() {
      const m = TODAY[betIdx]; if (!m) return;
      apiAction('api/predict', { match_id: m.id, home: hs, away: as }, '🎲 Ставка принята', '🪙');
    }
    $('modal-bg').onclick = (e) => { if (e.target.id === 'modal-bg') e.target.classList.remove('open'); };

    let DATA = null, active = 'oracles';
    function renderAll() {
      if (!DATA) return;
      $('v-oracles').innerHTML = renderOracles(DATA);
      $('v-today').innerHTML = renderToday(DATA);
      $('v-bracket').innerHTML = renderBracket(DATA);
      $('v-feed').innerHTML = renderFeed(DATA);
      $('v-factions').innerHTML = renderFactions(DATA);
      $('v-me').innerHTML = renderMe(DATA);
      $('upd').textContent = 'обновлено ' + ago(DATA.generated);
      document.querySelectorAll('.wlink').forEach(wl => wl.onclick = (e) => {
        e.preventDefault(); try { tg.openLink(wl.href); } catch (x) { window.open(wl.href, '_blank'); } });
      if (active === 'me' && ME) drawSpark(ME.form);
      checkGoals(DATA);   // ⚽ тост, если по live-матчу забили с прошлого обновления
    }
    document.querySelectorAll('.nav button').forEach(b => b.onclick = () => {
      haptic();
      active = b.dataset.v;
      document.querySelectorAll('.nav button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      $('v-' + active).classList.add('active');
      if (active === 'me' && ME) { drawSpark(ME.form); countUp($('me-coins'), ME.coins); }
    });
    function skeleton() { return Array(6).fill('<div class="sk"></div>').join(''); }
    function load() {
      const init = (tg && tg.initData) ? tg.initData : '';
      fetch(api('api/state'), { headers: init ? { 'X-Init-Data': init } : {} })
        .then(r => { if (!r.ok) throw 0; return r.json(); })
        .then(d => { DATA = d; renderAll(); })
        .catch(() => fetch('data.json?_=' + Date.now()).then(r => r.json())
          .then(d => { DATA = d; renderAll(); })
          .catch(() => { if (!DATA) $('v-oracles').innerHTML = '<div class="empty">Данные пока не выгружены</div>'; }));
    }
    $('v-oracles').innerHTML = skeleton();   // ✨ мерцание до первой загрузки
    load();
    setInterval(load, 30000);   // 🔴 лайв-автообновление каждые 30 c
  </script>
</body>
</html>
